name: Build Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Fabric Example Mod에서 gradlew 가져오기
        run: |
          curl -L https://github.com/FabricMC/fabric-example-mod/archive/refs/heads/1.21.zip -o example.zip
          unzip -q example.zip
          cp fabric-example-mod-1.21/gradlew ./gradlew
          cp -r fabric-example-mod-1.21/gradle ./gradle
          chmod +x gradlew

      - name: 빌드
        run: ./gradlew build

      - name: JAR 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: randomeffect-mod
          path: build/libs/randomeffect-*.jar
          if-no-files-found: error
